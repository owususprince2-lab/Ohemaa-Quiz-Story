<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Ohemaa's Anansewa Quiz</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #0d1117 0%, #1a0a2e 35%, #2d1b69 65%, #0d4a2e 100%);
  background-attachment: fixed;
  color: #fff;
}
.particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
.particle { position: absolute; border-radius: 50%; animation: floatUp linear infinite; }
@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-120px) scale(1.2); opacity: 0; }
}
.web-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; opacity: 0.03;
  background-image: repeating-linear-gradient(0deg, #fff 0, #fff 1px, transparent 0, transparent 50%),
    repeating-linear-gradient(90deg, #fff 0, #fff 1px, transparent 0, transparent 50%);
  background-size: 40px 40px;
}
.app { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 26px;
  padding: 40px;
  width: 100%;
  max-width: 700px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
}
h1 { font-size: 2.1rem; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 16px; }
.sub { color: rgba(255,255,255,0.55); font-size: 0.93rem; margin-bottom: 28px; line-height: 1.6; }
input[type=text] {
  width: 100%;
  background: rgba(255,255,255,0.09);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 14px;
  padding: 15px 18px;
  color: #fff;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 20px;
}
input[type=text]::placeholder { color: rgba(255,255,255,0.35); }
input[type=text]:focus { border-color: rgba(245,166,35,0.7); box-shadow: 0 0 0 3px rgba(245,166,35,0.1); }
.btn {
  display: block; width: 100%;
  padding: 16px; border-radius: 14px;
  border: none; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
}
.btn-primary { background: linear-gradient(135deg, #f5a623, #e8612a); color: #1a0a00; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(245,166,35,0.4); }
.btn-primary:active { transform: translateY(0); }
.set-cards { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
.set-card {
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.13);
  border-radius: 18px; padding: 20px 22px;
  cursor: pointer; transition: all 0.25s;
  display: flex; align-items: center; gap: 16px;
}
.set-card:hover { transform: translateX(5px); }
.set-card .icon { font-size: 2rem; flex-shrink: 0; }
.set-card h3 { font-size: 0.98rem; font-weight: 700; margin-bottom: 4px; }
.set-card p { font-size: 0.8rem; color: rgba(255,255,255,0.48); line-height: 1.5; }
.set-card .badge {
  margin-left: auto; flex-shrink: 0;
  font-size: 0.72rem; font-weight: 700;
  padding: 4px 10px; border-radius: 99px;
}
.progress-wrap { margin-bottom: 18px; }
.progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.84rem; color: rgba(255,255,255,0.58); }
.progress-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
.timer-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.timer-circle {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; font-weight: 800; border: 3px solid;
  transition: all 0.3s; flex-shrink: 0;
}
.tok { border-color: #34d399; color: #34d399; }
.twarn { border-color: #fbbf24; color: #fbbf24; }
.tdanger { border-color: #f87171; color: #f87171; animation: tpulse 0.5s ease infinite alternate; }
@keyframes tpulse { from { transform: scale(1); } to { transform: scale(1.1); } }
.q-text { font-size: 1.04rem; font-weight: 600; line-height: 1.65; margin-bottom: 20px; color: rgba(255,255,255,0.95); }
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex; align-items: flex-start; gap: 13px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.11);
  border-radius: 13px; padding: 13px 15px;
  cursor: pointer; transition: all 0.17s;
  font-size: 0.93rem; line-height: 1.5;
}
.option:hover:not(.locked) { background: rgba(245,166,35,0.1); border-color: rgba(245,166,35,0.4); }
.option.sel { background: rgba(245,166,35,0.16); border-color: rgba(245,166,35,0.6); }
.option.cor { background: rgba(52,211,153,0.15); border-color: #34d399; }
.option.wrg { background: rgba(248,113,113,0.15); border-color: #f87171; }
.opt-letter {
  min-width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.78rem; flex-shrink: 0; color: rgba(255,255,255,0.65);
}
.option.cor .opt-letter { background: #34d399; color: #022c22; }
.option.wrg .opt-letter { background: #f87171; color: #2c0000; }
.option.sel:not(.cor):not(.wrg) .opt-letter { background: rgba(245,166,35,0.55); color: #1a0a00; }
.fb {
  margin-top: 14px; padding: 14px 16px;
  border-radius: 14px; font-size: 0.87rem; line-height: 1.65;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fb-ok { background: rgba(52,211,153,0.11); border: 1px solid rgba(52,211,153,0.32); color: #6ee7b7; }
.fb-no { background: rgba(248,113,113,0.11); border: 1px solid rgba(248,113,113,0.32); color: #fca5a5; }
.next-btn {
  margin-top: 18px; padding: 14px; border-radius: 14px; border: none;
  color: #1a0a00; font-size: 1rem; font-weight: 700;
  cursor: pointer; width: 100%; transition: all 0.2s;
}
.next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245,166,35,0.35); }
.score-big {
  font-size: 5rem; font-weight: 900; text-align: center; margin: 12px 0 6px;
  background: linear-gradient(135deg, #f5a623, #34d399);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.score-lbl { text-align: center; color: rgba(255,255,255,0.52); margin-bottom: 20px; font-size: 0.94rem; }
.grade-badge {
  padding: 7px 22px; border-radius: 99px;
  font-weight: 800; font-size: 1.05rem;
  width: fit-content; margin: 0 auto 22px; display: block; text-align: center;
}
.stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 22px; }
.stat { background: rgba(255,255,255,0.07); border-radius: 14px; padding: 14px; text-align: center; }
.stat .n { font-size: 1.7rem; font-weight: 800; }
.stat .l { font-size: 0.74rem; color: rgba(255,255,255,0.48); margin-top: 3px; }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.btn-sec {
  padding: 13px; border-radius: 13px;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.06);
  color: #fff; font-size: 0.92rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}
.btn-sec:hover { background: rgba(255,255,255,0.11); }
.stag {
  display: inline-block; font-size: 0.71rem; font-weight: 700;
  padding: 3px 10px; border-radius: 99px;
  margin-bottom: 10px; letter-spacing: 0.3px;
}
.streak-txt { font-size: 0.82rem; }
.advice { background: rgba(255,255,255,0.05); border-radius: 14px; padding: 16px; margin-bottom: 20px; font-size: 0.86rem; color: rgba(255,255,255,0.62); line-height: 1.7; }
@media (max-width: 520px) {
  .card { padding: 22px 16px; }
  h1 { font-size: 1.6rem; }
  .stat-row { grid-template-columns: 1fr 1fr; }
  .btn-row { grid-template-columns: 1fr; }
  .score-big { font-size: 3.8rem; }
}
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const GSURL = "https://script.google.com/macros/s/AKfycbzQ49ebOvpIuttMBXh7gkCRU857mK6T0Hr3v4yiEisPzHjwHdaPFyD744kWGVu81KymqA/exec";

const S1 = [
  {sec:"Analytical Overview",q:"Efua Sutherland's primary aim in 'The Marriage of Anansewa' is to critique which condition?",o:["The decline of traditional Ghanaian theatre","The condition of greed in modern relationships","The lack of educational curricula for children","The death of indigenous publishing companies"],c:1,n:"The play depicts how greed has conditioned love and marriage institutions."},
  {sec:"Analytical Overview",q:"In the plot's exposition, Ananse's extortion plan is specifically triggered by:",o:["His desire for a new car","Anansewa's outstanding school fees","The visit of his mother Aya","A request for marriage from Togbe Klu IV"],c:1,n:"He plans to extort money to pay fees and gain wealth."},
  {sec:"Analytical Overview",q:"The 'falling action' of the play is defined by which specific event?",o:["Anansewa waking from her feigned death","The arrival of Chief-Who-Is-Chief's funeral items","The performance of the ritual of love incantations","Ananse realising he has sent too many letters"],c:1,n:"This moment allows Ananse to conclude who the truly loving husband is."},
  {sec:"Analytical Overview",q:"Which character represents the gap between modern sophistication and emotional dependence?",o:["Anansewa","Ekuwa","Christie","Aya"],c:2,n:"Christie's outward modernity contrasts with her desperate pursuit of male approval."},
  {sec:"Analytical Overview",q:"Anansewa's character is described as a 'dramatic device' primarily to interrogate:",o:["The beauty of traditional marriage rites","The marginalisation of women's voices","The efficiency of secretarial training","The cunning nature of the spider-man"],c:1,n:"She serves to interrogate patriarchal control and female silence."},
  {sec:"Stagecraft & Devices",q:"The use of a web-shaped screen on stage is a symbolic device representing:",o:["The interconnectedness of Ghanaian tribes","Ananse's entrapment of others through schemes","The complexity of modern educational systems","The ancestral protection of the Nsona clan"],c:1,n:"It externalizes his scheming and manipulative strategies."},
  {sec:"Stagecraft & Devices",q:"What is the function of 'Mboguo' within the dramatic structure?",o:["To manage and distribute stage props","To provide a religious atmosphere through mime","To serve as musical interludes that advance the plot","To deliver letters to the four different chiefs"],c:2,n:"These interludes heighten entertainment and reveal vital information."},
  {sec:"Stagecraft & Devices",q:"'Selective Modernity' is best exemplified by Ananse's desire to:",o:["Buy a typewriter for his daughter","Renovate his house while following customary rites","Send his daughter to a secretarial school","Use a telephone to contact the Mines"],c:1,n:"He pursues modern comfort while relying on tradition for personal gain."},
  {sec:"Stagecraft & Devices",q:"The 'Property Man' on stage contributes to the play's realism by:",o:["Acting as the primary storyteller","Manning a property stand and distributing props on cue","Portraying the four chiefs in various scenes","Leading the audience in collective singing"],c:1,n:"He manages props and supports smooth scene transitions."},
  {sec:"Stagecraft & Devices",q:"Dramatic irony is effectively used in Act Two when:",o:["Anansewa pretends to be dead in front of the messengers","The Postman fails to recognise Ananse as the recipient","Christie reflects on Ananse's silence in a soliloquy","Aya and Ekuwa leave for Nanka to fight enemies"],c:1,n:"The audience knows Ananse's identity, but the Postman does not."},
  {sec:"Themes & Characters",q:"The theme of 'Female Education' is articulated as 'social capital' through:",o:["Ananse's insistence on the typewriter","Chief-Who-Is-Chief's preference for an educated wife","Christie's role as a fashionable modern woman","Anansewa's ability to write shorthand"],c:1,n:"Education is seen as a criterion of worth for social order and partnership."},
  {sec:"Themes & Characters",q:"In the analytical framework, the 'climax' of the play is identified as:",o:["When Anansewa is resurrected from death","When the four chiefs all announce they are coming","When Ananse realises the Mines Chief is wealthy","When the letters are posted at the Post Office"],c:1,n:"The arrival of messengers from all four chiefs creates the central chaos."},
  {sec:"Themes & Characters",q:"Which minor character reflects the collective participation of women in traditional practices?",o:["Christie","Ekuwa","The Postman","The Storyteller"],c:1,n:"As Ananse's aunt, she assists in marriage preparations and rituals."},
  {sec:"Stagecraft & Devices",q:"The technique of 'Mime' is specifically used to represent which scene?",o:["The writing of the four letters","The church scene and the inviting of witnesses","The battle at the cocoa farm in Nanka","The meeting between Ananse and Chief-Who-Is-Chief"],c:1,n:"Meaning is communicated through physical action rather than dialogue here."},
  {sec:"The Storyteller",q:"Which phrase describes the Storyteller's relationship to the audience in Anansegoro?",o:["A detached observer","The owner of the story with a right to know everything","A silent director behind the scenes","A character trapped in Ananse's web"],c:1,n:"The narrator is seen as the owner of the story and is personally involved."},
  {sec:"Themes & Characters",q:"Anansewa's song in Act 1 serves as a vehicle for:",o:["Her acceptance of the marriage proposals","Her open resistance to being sold like a parcel","Her appreciation for her new typewriter","Her desire to marry Chief-Who-Is-Chief"],c:1,n:"Music is used here to reveal her resistance to her father's intentions."},
  {sec:"The Storyteller",q:"What does the term 'Anansegoro' refer to?",o:["The traditional body of Ananse folktales","A system of traditional theatre combining narration and action","The specific name of Ananse's ancestral clan","The act of paying a head-drink for a bride"],c:1,n:"It is the developed classification of traditional theatre used in the play."},
  {sec:"Stagecraft & Devices",q:"The 'Flashback' technique is used in the play to clarify:",o:["The death of Anansewa's mother","Ananse's insistence on the taking of photographs","The childhood of Chief-Who-Is-Chief","How Christie and Ananse first met"],c:1,n:"It revives past experiences to explain Ananse's current schemes."},
  {sec:"Themes & Characters",q:"Ananse's 'materialistic approach' to marriage is most directly contrasted with:",o:["Christie's fashionable appearance","Chief-Who-Is-Chief's progressive understanding","Aya's traditional family values","The Mines Chief's extravagance"],c:1,n:"One sees marriage as possession, the other as partnership."},
  {sec:"Themes & Characters",q:"The 'Messengers' advance the plot by acting as:",o:["Comedians who distract the audience","Emissaries who make the chiefs' presence felt","Witnesses to Ananse's ritual of love","Teachers at Anansewa's secretarial school"],c:1,n:"They convey intentions and heighten tension without the chiefs appearing."},
  {sec:"Themes & Characters",q:"Which theme suggests that marriage negotiations are economic metaphors?",o:["Selective Modernity","Cultural Continuity","Female Commodification","Greed"],c:2,n:"Marriage negotiations function as a metaphor for market exchange."},
  {sec:"Stagecraft & Devices",q:"The 'Soliloquy' in Act 3 provides insight into:",o:["Ananse's fear of the four chiefs","Christie's emotional state regarding Ananse","Anansewa's love for her father","Aya's anger at the cocoa farm fire"],c:1,n:"Christie reflects on Ananse's silence and his obliviousness to her."},
  {sec:"Stagecraft & Devices",q:"Audience participation in the play is achieved through:",o:["Allowing spectators to vote on the best suitor","Collective singing and clapping","Inviting the audience to help Ananse type letters","Asking the audience to pay Anansewa's fees"],c:1,n:"This transforms spectators into co-performers."},
  {sec:"Themes & Characters",q:"Ananse's cunning nature is described as coming out specifically in times of:",o:["Great wealth and prosperity","Need and desperation","Religious devotion and prayer","Joy and family celebrations"],c:1,n:"His craftiness reflects how man reacts to desperation."},
  {sec:"Themes & Characters",q:"The resolution of the play is termed a 'ritual of love' because:",o:["It involves the actual burial of Anansewa","Love is credited with resurrecting Anansewa","The four chiefs finally agree to share Anansewa","Ananse gives up all his wealth for his daughter"],c:1,n:"Anansewa is 'resurrected' from her fake death because of love."},
];

const S2 = [
  {sec:"Analytical Pt. 2",q:"What is the 'Okyame' in the context of the Storyteller's staff?",o:["A sacred religious artifact","A Chief's official spokesman","A prop used to trap spiders","A symbol of Ananse's poverty"],c:1,n:"The storyteller's staff is an imitation of this official role."},
  {sec:"Analytical Pt. 2",q:"'Anansesem' is distinguished from 'Anansegoro' by being:",o:["A modern musical drama","A traditional story-telling art of the Akan people","A specific type of funeral dirge","The name of the secretarial school"],c:1,n:"It refers to the body of stories and the performance itself."},
  {sec:"Analytical Pt. 2",q:"Ananse's character represents 'Everyman' to serve as a medium for:",o:["Entertainment alone","Society to criticise itself","Religious instruction","Promoting foreign cultures"],c:1,n:"He mirrors human follies for societal self-examination."},
  {sec:"Analytical Pt. 2",q:"The expression 'Ananse's wealth!' is described in the Foreword as:",o:["A compliment for his hard work","A sarcastic expression for temporary success","A literal description of his bank account","A curse from the four chiefs"],c:1,n:"It refers to triumphs that are not likely to last."},
  {sec:"Analytical Pt. 2",q:"According to the analytical framework, Ananse's greed eventually leads to:",o:["Eternal fame","A moral decay and personal downfall","The successful marriage of his daughter to four men","The renovation of the entire town of Sapaase"],c:1,n:"Excessive desire for wealth causes this decay."},
  {sec:"Analytical Pt. 2",q:"The 'Post Office Crew' are categorised in the cast as:",o:["Main characters","Minor characters played by the pool of Players","Messengers from the Chief-Who-Is-Chief","Relatives of Christie"],c:1,n:"They are part of the participating audience/players."},
  {sec:"Analytical Pt. 2",q:"Aya embodies which archetype in her domestic role?",o:["The cunning trickster","The fashionable modern woman","The affectionate, nurturing grandmother","The greedy business partner"],c:2,n:"She provides emotional support and traditional values."},
  {sec:"Analytical Pt. 2",q:"The 'climax' begins specifically when the four chiefs:",o:["Refuse to pay any more money","Show interest and send messengers simultaneously","Discover that Anansewa is still alive","Threaten to arrest Ananse for fraud"],c:1,n:"The simultaneous interest creates the chaos leading to the fake death."},
  {sec:"Analytical Pt. 2",q:"The 'falling action' depicts Chief-Who-Is-Chief as:",o:["The wealthiest and most arrogant","The only suitor with good and loving intentions","A man who refuses to help with the funeral","A suitor who was easily deceived by Ananse"],c:1,n:"He is the only one who sends items for the burial."},
  {sec:"Analytical Pt. 2",q:"The 'Property Man' can also function as a:",o:["Lead singer in the Mboguo","Prompter for the actors","Judge in the final scene","Suitor for Anansewa"],c:1,n:"He is available as an actor and prompter."},
  {sec:"Analytical Pt. 2",q:"Anansewa's 'seeming passivity' should be read as:",o:["True intellectual weakness","A reflection of limited socio-cultural options","A desire to avoid secretarial training","Fear of the Chief of the Mines"],c:1,n:"It reflects her context rather than personal character."},
  {sec:"Analytical Pt. 2",q:"Christie's pursuit of Ananse exposes a gap between:",o:["Traditional and modern education","Appearance and reality","Wealth and poverty","Youth and old age"],c:1,n:"Her sophisticated image contrasts with her behaviour."},
  {sec:"Analytical Pt. 2",q:"The Storyteller has a conventional right to:",o:["Marry Anansewa himself","Know everything and be personally involved","Dismiss the Property Man at any time","Change the script of the play mid-performance"],c:1,n:"He is seen as the 'owner' of the story."},
  {sec:"Analytical Pt. 2",q:"Mboguo can be used to acquaint the audience with:",o:["The price of the typewriter","Shifts of time or place","The name of the author","The correct way to type a letter"],c:1,n:"It helps develop action and characterisation."},
  {sec:"Analytical Pt. 2",q:"The phrase 'Exterminate Ananse, and society will be ruined' means:",o:["Ananse is a hero who must be protected","He is a necessary artistic medium for self-criticism","Spiders are essential to the Ghanaian ecosystem","Deceit is the only way for society to function"],c:1,n:"He is essential for society to criticise itself."},
  {sec:"Analytical Pt. 2",q:"What does the 'Okyame' staff symbolise for the Storyteller?",o:["Authority in the traditional performance","A weapon for self-defense","A tool for the Property Man","A gift from the Chief of Akate"],c:0,n:"It is an adaptation of the Chief's spokesman's staff."},
  {sec:"Analytical Pt. 2",q:"The use of 'Letters' in Act 1 is a narrative device that:",o:["Delays the marriage plot indefinitely","Initiates the plot and enables simultaneous manipulation","Proves Anansewa is the best typist in Ghana","Warns the chiefs about Ananse's greed"],c:1,n:"It initiates the plot and creates tension."},
  {sec:"Analytical Pt. 2",q:"In Act 2, the 'Postman' encounters Ananse but:",o:["Delivers a letter to Christie instead","Fails to recognise him as the intended recipient","Asks for a bribe to deliver the telegram","Tells him the Chief of Sapaase is dead"],c:1,n:"This gap in knowledge creates dramatic irony."},
  {sec:"Analytical Pt. 2",q:"The 'Spider's Web' device signals Ananse's withdrawal for:",o:["Sleep and relaxation","Concealment and strategic reassessment","Traditional prayer and fasting","Counting the money he has extorted"],c:1,n:"He retreats behind the web during failures for reassessment."},
  {sec:"Analytical Pt. 2",q:"Which theme highlights the priority of wealth over human relationships?",o:["Female Education","Selective Modernity","Greed","Cultural Continuity"],c:2,n:"Ananse's schemes put Anansewa at emotional risk."},
  {sec:"Analytical Pt. 2",q:"The Storyteller describes Ananse's successes as:",o:["Permanent and glorious","Doubtful and temporary","The result of pure honesty","Recognised by all characters in the play"],c:1,n:"His schemes usually ruin him and end in impoverishment."},
  {sec:"Analytical Pt. 2",q:"The 'Mime' technique in the church scene communicates meaning through:",o:["Secretarial shorthand","Physical action rather than spoken dialogue","Choral singing in the background","The use of a glass coffin"],c:1,n:"It communicates entirely through action."},
  {sec:"Analytical Pt. 2",q:"Anansewa's dependence is reinforced when Ananse threatens to:",o:["Burn her typewriter","Withdraw financial support for her education","Marry Christie himself","Send her to the Chief of the Mines"],c:1,n:"This coercion emphasises the vulnerability of women."},
  {sec:"Analytical Pt. 2",q:"The play's structure ensures clarity by having the Storyteller:",o:["Write the script on a blackboard","Guide the audience's understanding of events","Play the role of Anansewa","Remain silent throughout Act 4"],c:1,n:"He ensures clarity and guides the storyline."},
  {sec:"Analytical Pt. 2",q:"What role does Efua Sutherland play in modern Ghanaian theatre?",o:["She was a minor playwright with little influence","She was a key figure who founded the Ghana Drama Studio","She primarily focused on film acting","She was the first woman to marry a chief in Ghana"],c:1,n:"She founded the Society of Writers, Drama Studio, and Experimental Theatre."},
];

const S3 = [
  {sec:"The Script",q:"In the Foreword, what is the humorous story-telling term for being 'tricked'?",o:["Spun","Entrapped","Hoaxed","Webbed"],c:2,n:"Listeners encourage the narrator by saying 'Keep hoaxing me!'"},
  {sec:"The Script",q:"At the start of Act 1, Ananse is wearing:",o:["A brand-new kente cloth","A shabby raincoat","A business suit","A traditional priest's robe"],c:1,n:"He enters hastily escaping the rain."},
  {sec:"The Script",q:"Ananse calls for the typewriter he bought for Anansewa at a price that:",o:["Was a gift from the Chiefs","Nearly drove him to sell himself","Was paid for by Christie","Was half-price during a sale"],c:1,n:"This emphasises his financial desperation."},
  {sec:"The Script",q:"What does Ananse specifically want for his 'comfortable future'?",o:["A straw-stuffed mattress","A soft, bouncy Dunlopillo mattress","A wooden stool from Nanka","A hammock in the garden"],c:1,n:"He uses this as an index of his lack of comfort."},
  {sec:"The Script",q:"When typing the letters, Anansewa is told that 'Dear Chief of Sapa' is:",o:["Perfect and respectful","Too ordinary","A secret code","Too aggressive"],c:1,n:"He replaces it with grandiose appellations."},
  {sec:"The Script",q:"The appellation 'Mighty-Tree-Of-Ancient-Origin' is addressed to:",o:["Togbe Klu IV","The Chief of the Mines","The Chief of Sapaase","Chief-Who-Is-Chief"],c:2,n:"This is the first letter Ananse dictates."},
  {sec:"The Script",q:"Which Chief is described as 'Prickly-Pear! Cactus keeping guard'?",o:["Chief of Sapaase","Togbe Klu IV","Chief of the Mines","The unnamed chief from Mali"],c:1,n:"He is the Chief of Akate."},
  {sec:"The Script",q:"The Chief of the Mines is addressed with a poem about:",o:["Driver ants being astir","Fire-extinguishers","Golden stools","Water to refresh friends"],c:0,n:"This identity is whispered into Anansewa's ear."},
  {sec:"The Script",q:"Which Chief is described as the 'Fire-Extinguisher'?",o:["Togbe Klu IV","Chief of Sapaase","Chief-Who-Is-Chief","The Chief of the Mines"],c:2,n:"This title is used in his highly speed-recited letter."},
  {sec:"The Script",q:"How much money does Ananse count out for Anansewa's fees in Act 1?",o:["Ten clean cedis","One hundred and twenty cedis","Fifty guineas","Five hundred cedis"],c:1,n:"It is described as clean money from his bulging wallet."},
  {sec:"The Script",q:"What is Ananse's 'oracle' according to his own words?",o:["His bulging wallet","The typewriter","His eyes","The Storyteller"],c:2,n:"He quotes the rhesus monkey saying 'My eyes are my oracle.'"},
  {sec:"The Script",q:"In Act 1, Anansewa realises her father is 'selling her' and sings that she is not:",o:["A schoolgirl","A parcel to a customer","A bota bead","A secretarial student"],c:1,n:"She insists she will select her lover herself."},
  {sec:"The Script",q:"Ananse organises a 'most lively competition' around his daughter to:",o:["Make her the most famous woman in Ghana","Let human nature help disentangle the knot","Prove that he is the smartest man in Nanka","Get four cars instead of one"],c:1,n:"He counts on human nature to decide the winner."},
  {sec:"The Script",q:"What is the 'head-drink' mentioned in the script?",o:["A celebratory gin after a hunt","A token sum and drinks to establish marriage legally","A ritual bath given to the bride","The water Ananse drinks to cure his headache"],c:1,n:"It is a formal token handed to the bride's family."},
  {sec:"The Script",q:"The Postman delivers a letter in Act 2 to 'AW/6615 Lagoon Street' which is:",o:["A local hospital","Ananse's house","The Post Office headquarters","The Chief of the Mines' palace"],c:1,n:"The address is confirmed by the Storyteller."},
  {sec:"The Script",q:"In Act 2, Ananse tells the Property Man to buy every newspaper to search for:",o:["Business advertisements","Notices of memorial services","News about the Chief of the Mines","Secretarial school results"],c:1,n:"He wants to attend services to 'deposit with the spenders.'"},
  {sec:"The Script",q:"The workmen doubling their contract time to ten weeks is because:",o:["Ananse personally demanded it","The house is too large to finish quickly","They can exploit the 'man in their pocket'","There is a lack of building materials"],c:2,n:"They realise they can finish slowly and stay longer."},
  {sec:"The Script",q:"Who is 'Abena' in the Mboguo song 'Am I Not Odum's Child'?",o:["Ananse's first wife","A delicate daughter unprepared for hardship","The Chief of Sapaase's mother","The girl Akwasi is chasing"],c:1,n:"She is the unseasoned one who'd 'rather be dead.'"},
  {sec:"The Script",q:"Aya is upset by Anansewa's outdooring because it is:",o:["Five years too late","Too expensive for the family","Organised by the Storyteller","Not involving the four chiefs"],c:0,n:"She says it should have happened when she became a woman."},
  {sec:"The Script",q:"What specific ritual item is 'passed over' Anansewa's head during the outdooring?",o:["A kente cloth","An egg","A glass of gin","A typewriter ribbon"],c:1,n:"It is her 'soul's egg' to attract good fortune."},
  {sec:"The Script",q:"Ananse lies to Aya and Ekuwa about a fire at the cocoa farm in:",o:["Sapaase","Akate","Nanka","Lagoon Street"],c:2,n:"This is his ruse to get them to leave the house."},
  {sec:"The Script",q:"How does Ananse instruct Anansewa to 'die' in preparation?",o:["To swallow a sleeping pill","To stiffen her limbs and hold her breath","To hide behind the spider's web","To run away to Mexico"],c:1,n:"He tells her to look as though she is dead."},
  {sec:"The Script",q:"Which Chief sends a 'glass coffin' to the funeral?",o:["Chief of Sapaase","Chief of the Mines","Togbe Klu IV","Chief-Who-Is-Chief"],c:3,n:"He sends it to do what a 'real husband does.'"},
  {sec:"The Script",q:"In the final libation, Ananse asks the ancestors to:",o:["Punish the three chiefs who sent bad gifts","Wake Anansewa if Chief-Who-Is-Chief is the right man","Burn down the rest of the cocoa farm","Give him a new soft Dunlopillo mattress"],c:1,n:"He asks them to 'Wake her!' if the marriage is desired."},
  {sec:"The Script",q:"Anansewa's final 'awakening' is attributed by Ananse to the power of:",o:["Modern medicine","Amazing love","Traditional incantations","Her secretarial certificate"],c:1,n:"He claims love has won a victory."},
];

const SETS = [
  {id:0,label:"Set 1",title:"Analytical Overview — Part 1",icon:"🕷️",desc:"Dramatic devices, themes, characterisation & analytical framework (Q1–25)",qs:S1,col:"#f5a623"},
  {id:1,label:"Set 2",title:"Analytical Overview — Part 2",icon:"🎭",desc:"Anansegoro, stagecraft, Storyteller's role & deeper thematic analysis (Q26–50)",qs:S2,col:"#a78bfa"},
  {id:2,label:"Set 3",title:"The Script Itself",icon:"📜",desc:"Specific plot details, dialogue, character actions & scene-by-scene events (Q51–75)",qs:S3,col:"#34d399"},
];

const L=['A','B','C','D'], T=30;
const OK=["Correct, Ohemaa!","Brilliant!","Spot on!","That's right!","Nailed it!","Excellent!","Perfect!","Well done!"];
const NO=["Not quite — see the note!","Review this one carefully.","Tricky! Check the explanation.","Close, but not right.","Study this one again!"];
const rnd=a=>a[Math.floor(Math.random()*a.length)];

function Particles(){
  const ps=Array.from({length:22},(_,i)=>({
    left:Math.random()*100,delay:Math.random()*10,
    dur:7+Math.random()*9,size:2+Math.random()*5,
    col:['rgba(245,166,35,0.35)','rgba(167,139,250,0.35)','rgba(52,211,153,0.3)','rgba(255,255,255,0.17)'][i%4]
  }));
  return <div className="particles">{ps.map((p,i)=><div key={i} className="particle" style={{left:p.left+'%',bottom:'-10px',width:p.size+'px',height:p.size+'px',background:p.col,animationDelay:p.delay+'s',animationDuration:p.dur+'s'}}/>)}</div>;
}

function App(){
  const [view,setView]=useState('name');
  const [name,setName]=useState('');
  const [qs,setQs]=useState([]);
  const [slbl,setSlbl]=useState('');
  const [scol,setScol]=useState('#f5a623');
  const [sidx,setSidx]=useState(0);
  const [qi,setQi]=useState(0);
  const [sel,setSel]=useState(null);
  const [rev,setRev]=useState(false);
  const [ans,setAns]=useState([]);
  const [tl,setTl]=useState(T);
  const [streak,setStreak]=useState(0);
  const [best,setBest]=useState(0);
  const tmr=useRef(null);

  useEffect(()=>{
    if(view!=='quiz') return;
    if(rev){clearInterval(tmr.current);return;}
    tmr.current=setInterval(()=>{
      setTl(t=>{
        if(t<=1){clearInterval(tmr.current);reveal(null);return 0;}
        return t-1;
      });
    },1000);
    return()=>clearInterval(tmr.current);
  },[view,qi,rev]);

  const reveal=(idx)=>{
    const q=qs[qi];
    const ok=idx===q.c;
    const ns=ok?streak+1:0;
    setStreak(ns); setBest(b=>Math.max(b,ns));
    setAns(p=>[...p,{chosen:idx,correct:q.c,ok}]);
    setSel(idx); setRev(true);
  };

  const pick=(idx)=>{
    if(rev)return;
    clearInterval(tmr.current);
    setSel(idx);
    setTimeout(()=>reveal(idx),180);
  };

  const next=()=>{
    if(qi+1>=qs.length){submit();setView('results');}
    else{setQi(qi+1);setSel(null);setRev(false);setTl(T);}
  };

  const submit=async()=>{
    const sc=ans.filter(a=>a.ok).length;
    try{await fetch(GSURL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({studentName:name,sheet:'Sheet1',rawScore:sc,finalScore:sc,totalQuestions:qs.length,percentage:((sc/qs.length)*100).toFixed(1),setUsed:slbl,timestamp:new Date().toLocaleString()})});}catch(e){}
  };

  const startSet=(s)=>{
    setQs(s.qs);setSlbl(s.label+' — '+s.title);setScol(s.col);setSidx(s.id);
    setQi(0);setAns([]);setSel(null);setRev(false);setTl(T);setStreak(0);setBest(0);
    setView('quiz');
  };

  const score=ans.filter(a=>a.ok).length;
  const pct=qs.length?Math.round((score/qs.length)*100):0;
  const grade=(p)=>{
    if(p>=90)return{lbl:'Outstanding! 🏆',bg:'#34d399',col:'#022c22'};
    if(p>=75)return{lbl:'Excellent! ⭐',bg:'#f5a623',col:'#1a0a00'};
    if(p>=60)return{lbl:'Good work! 👍',bg:'#60a5fa',col:'#1e3a5f'};
    if(p>=50)return{lbl:'Keep going! 📖',bg:'#a78bfa',col:'#1e1b4b'};
    return{lbl:'More revision needed 💪',bg:'#f87171',col:'#2c0000'};
  };
  const g=grade(pct);
  const tc=tl>15?'tok':tl>8?'twarn':'tdanger';

  if(view==='name') return(
    <div className="app"><Particles/><div className="web-bg"/>
      <div className="card">
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:'3.2rem',marginBottom:10}}>🕸️</div>
          <h1>Anansewa Revision</h1>
          <p className="sub">The Marriage of Anansewa · Efua Sutherland<br/>75 questions across 3 sets — test your mastery!</p>
        </div>
        <input type="text" placeholder="Enter your name..." value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&name.trim()&&setView('choose')}/>
        <button className="btn btn-primary" onClick={()=>{if(name.trim())setView('choose');}}>Let's go →</button>
      </div>
    </div>
  );

  if(view==='choose') return(
    <div className="app"><Particles/><div className="web-bg"/>
      <div className="card">
        <h2>Welcome, {name.split(' ')[0]}! 👋</h2>
        <p className="sub">Three sets of 25 questions each. Pick a set to begin — 30 seconds per question.</p>
        <div className="set-cards">
          {SETS.map(s=>(
            <div key={s.id} className="set-card" style={{'--hc':s.col}} onClick={()=>startSet(s)}
              onMouseEnter={e=>{e.currentTarget.style.background=`${s.col}18`;e.currentTarget.style.borderColor=`${s.col}55`;}}
              onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.borderColor='rgba(255,255,255,0.13)';}}>
              <div className="icon">{s.icon}</div>
              <div style={{flex:1}}><h3>{s.title}</h3><p>{s.desc}</p></div>
              <div className="badge" style={{background:`${s.col}22`,color:s.col}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  if(view==='quiz'){
    const q=qs[qi];
    const prog=(qi/qs.length)*100;
    const lastAns=ans[ans.length-1];
    return(
      <div className="app"><Particles/><div className="web-bg"/>
        <div className="card">
          <div className="progress-wrap">
            <div className="progress-top">
              <span>{qi+1} / {qs.length}</span>
              <span className="streak-txt">
                {streak>=2?<span style={{color:scol,fontWeight:700}}>🔥 {streak} in a row!</span>
                  :<span style={{color:'rgba(255,255,255,0.48)'}}>{score} correct so far</span>}
              </span>
            </div>
            <div className="progress-bar"><div className="progress-fill" style={{width:prog+'%',background:`linear-gradient(90deg,${scol},#34d399)`}}/></div>
          </div>
          <div className="timer-row">
            <div style={{flex:1}}><div className="stag" style={{background:`${scol}22`,color:scol}}>{q.sec}</div></div>
            <div className={`timer-circle ${tc}`}>{tl}s</div>
          </div>
          <p className="q-text">{q.q}</p>
          <div className="options">
            {q.o.map((opt,idx)=>{
              let cls='option';
              if(rev){
                if(idx===q.c)cls+=' cor';
                else if(idx===sel&&idx!==q.c)cls+=' wrg';
                cls+=' locked';
              } else if(idx===sel) cls+=' sel';
              return(
                <div key={idx} className={cls} onClick={()=>pick(idx)}>
                  <span className="opt-letter">{L[idx]}</span>
                  <span>{opt}</span>
                </div>
              );
            })}
          </div>
          {rev&&(
            <div className={`fb ${lastAns?.ok?'fb-ok':'fb-no'}`}>
              <strong>{lastAns?.ok?rnd(OK):rnd(NO)}</strong>
              <br/><span style={{opacity:0.88}}>{q.n}</span>
            </div>
          )}
          {rev&&(
            <button className="next-btn" style={{background:`linear-gradient(135deg,${scol},#34d399)`}} onClick={next}>
              {qi+1>=qs.length?'See my results 🎉':'Next question →'}
            </button>
          )}
        </div>
      </div>
    );
  }

  if(view==='results') return(
    <div className="app"><Particles/><div className="web-bg"/>
      <div className="card">
        <div style={{textAlign:'center',marginBottom:8}}>
          <div style={{fontSize:'2.5rem',marginBottom:8}}>🎭</div>
          <h2>Done, {name.split(' ')[0]}!</h2>
          <p style={{fontSize:'0.8rem',color:'rgba(255,255,255,0.38)',marginTop:4}}>{slbl}</p>
        </div>
        <div className="score-big">{score}/{qs.length}</div>
        <p className="score-lbl">{pct}% correct</p>
        <div className="grade-badge" style={{background:g.bg,color:g.col}}>{g.lbl}</div>
        <div className="stat-row">
          <div className="stat"><div className="n" style={{color:'#34d399'}}>{score}</div><div className="l">Correct</div></div>
          <div className="stat"><div className="n" style={{color:'#f87171'}}>{qs.length-score}</div><div className="l">Missed</div></div>
          <div className="stat"><div className="n" style={{color:scol}}>{best}</div><div className="l">Best streak</div></div>
        </div>
        <div className="advice">
          {pct>=80?"Excellent command of the play! Review any missed items and you are fully prepared."
          :pct>=60?"Good foundation! Pay closer attention to the analytical devices — Mboguo, Mime, and the Spider's Web symbolism are especially important."
          :"Focus on the core themes: greed, female commodification, and how Anansegoro works as a theatrical form. Revisit the Storyteller's role and the dramatic structure."}
        </div>
        <div className="btn-row">
          <button className="btn-sec" onClick={()=>startSet(SETS[sidx])}>Retry this set</button>
          <button className="btn-sec" onClick={()=>setView('choose')}>Try another set</button>
        </div>
        <button className="btn btn-primary" onClick={()=>{setView('name');setName('');}}>All done ✓</button>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
