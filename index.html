<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Electronics Revision Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg: #060a12;
  --surface: #0d1520;
  --border: rgba(0,220,255,0.12);
  --accent: #00dcff;
  --accent2: #ff6b35;
  --accent3: #a8ff3e;
  --text: #e8f4f8;
  --muted: rgba(232,244,248,0.45);
  --theory: #00dcff;
  --calc: #ff6b35;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(0,220,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,107,53,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 50% 50%, rgba(168,255,62,0.03) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}
.grid-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,220,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,220,255,0.03) 1px, transparent 1px);
  background-size:48px 48px;
}
.app{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{
  width:100%;max-width:740px;
  background:rgba(13,21,32,0.85);
  border:1px solid var(--border);
  border-radius:20px;
  padding:44px;
  box-shadow:0 0 60px rgba(0,220,255,0.05), 0 30px 60px rgba(0,0,0,0.6);
  backdrop-filter:blur(20px);
}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.logo-icon{
  width:48px;height:48px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),rgba(0,220,255,0.3));
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;flex-shrink:0;
  box-shadow:0 0 20px rgba(0,220,255,0.25);
}
.logo-text{font-size:0.75rem;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
h1{font-size:2.4rem;font-weight:900;line-height:1.1;margin-bottom:8px;letter-spacing:-1px;}
h1 span{
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{font-size:0.9rem;color:var(--muted);line-height:1.7;margin-bottom:32px;font-family:'Space Mono',monospace;}

/* name input */
.input-wrap{position:relative;margin-bottom:20px;}
input[type=text]{
  width:100%;background:rgba(0,220,255,0.05);
  border:1.5px solid rgba(0,220,255,0.2);
  border-radius:12px;padding:15px 20px;
  color:var(--text);font-size:1rem;font-family:'Syne',sans-serif;
  outline:none;transition:all 0.2s;
}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,220,255,0.1);}
input[type=text]::placeholder{color:rgba(232,244,248,0.25);}

.btn-primary{
  width:100%;padding:16px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--accent),rgba(0,220,255,0.7));
  color:#060a12;font-size:1rem;font-weight:800;
  cursor:pointer;transition:all 0.2s;font-family:'Syne',sans-serif;
  letter-spacing:0.3px;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,220,255,0.3);}

/* chapter select */
.section-label{
  font-family:'Space Mono',monospace;font-size:0.7rem;
  color:var(--accent);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:16px;
}
h2{font-size:1.5rem;font-weight:800;margin-bottom:6px;}
.ch-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:28px;}
.ch-card{
  border:1.5px solid rgba(255,255,255,0.08);
  border-radius:14px;padding:18px 20px;
  cursor:pointer;transition:all 0.2s;
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:center;gap:14px;
  background:rgba(255,255,255,0.025);
}
.ch-card:hover:not(.wip){background:rgba(0,220,255,0.06);border-color:rgba(0,220,255,0.3);}
.ch-card.wip{opacity:0.5;cursor:not-allowed;}
.ch-card.selected{background:rgba(0,220,255,0.09);border-color:rgba(0,220,255,0.5);}
.ch-num{
  font-family:'Space Mono',monospace;font-size:1.6rem;font-weight:700;
  color:rgba(0,220,255,0.3);width:36px;text-align:center;
}
.ch-card.selected .ch-num{color:var(--accent);}
.ch-info h3{font-size:0.95rem;font-weight:700;margin-bottom:3px;}
.ch-info p{font-size:0.78rem;color:var(--muted);line-height:1.4;}
.wip-badge{
  font-size:0.68rem;font-weight:700;font-family:'Space Mono',monospace;
  padding:4px 10px;border-radius:99px;
  background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.3);
  border:1px solid rgba(255,255,255,0.1);
}
.ready-badge{
  font-size:0.68rem;font-weight:700;font-family:'Space Mono',monospace;
  padding:4px 10px;border-radius:99px;
  background:rgba(168,255,62,0.1);color:var(--accent3);
  border:1px solid rgba(168,255,62,0.25);
}

/* type select */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
.type-card{
  border:2px solid rgba(255,255,255,0.08);
  border-radius:16px;padding:24px 20px;
  cursor:pointer;transition:all 0.25s;
  text-align:center;background:rgba(255,255,255,0.02);
}
.type-card:hover{transform:translateY(-3px);}
.type-card.theory-card:hover{border-color:rgba(0,220,255,0.5);background:rgba(0,220,255,0.07);}
.type-card.calc-card:hover{border-color:rgba(255,107,53,0.5);background:rgba(255,107,53,0.07);}
.type-icon{font-size:2.2rem;margin-bottom:10px;}
.type-card h3{font-size:1rem;font-weight:800;margin-bottom:6px;}
.type-card p{font-size:0.78rem;color:var(--muted);line-height:1.5;}
.theory-card h3{color:var(--theory);}
.calc-card h3{color:var(--calc);}
.type-timer{
  display:inline-block;margin-top:10px;
  font-family:'Space Mono',monospace;font-size:0.72rem;
  padding:3px 10px;border-radius:99px;
}
.theory-timer{background:rgba(0,220,255,0.1);color:var(--theory);border:1px solid rgba(0,220,255,0.2);}
.calc-timer{background:rgba(255,107,53,0.1);color:var(--calc);border:1px solid rgba(255,107,53,0.2);}

/* quiz */
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:0.82rem;color:var(--muted);font-family:'Space Mono',monospace;}
.progress-bar{width:100%;height:4px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden;margin-bottom:20px;}
.progress-fill{height:100%;border-radius:99px;transition:width 0.4s ease;}
.timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.q-tag{
  font-family:'Space Mono',monospace;font-size:0.7rem;
  padding:4px 12px;border-radius:99px;letter-spacing:1px;
}
.theory-tag{background:rgba(0,220,255,0.1);color:var(--theory);border:1px solid rgba(0,220,255,0.2);}
.calc-tag{background:rgba(255,107,53,0.1);color:var(--calc);border:1px solid rgba(255,107,53,0.2);}
.timer-ring{
  width:54px;height:54px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;
  border:2.5px solid;transition:all 0.3s;flex-shrink:0;
}
.tok{border-color:var(--accent3);color:var(--accent3);}
.twarn{border-color:#fbbf24;color:#fbbf24;}
.tdanger{border-color:#f87171;color:#f87171;animation:tpulse 0.5s ease infinite alternate;}
@keyframes tpulse{from{transform:scale(1);}to{transform:scale(1.1);}}
.q-text{
  font-size:1rem;font-weight:600;line-height:1.75;
  margin-bottom:22px;color:rgba(232,244,248,0.95);
}
.q-text sup,
.q-text sub{font-size:0.75em;}
.options{display:flex;flex-direction:column;gap:9px;}
.option{
  display:flex;align-items:flex-start;gap:12px;
  background:rgba(255,255,255,0.035);
  border:1.5px solid rgba(255,255,255,0.08);
  border-radius:12px;padding:13px 15px;
  cursor:pointer;transition:all 0.15s;
  font-size:0.9rem;line-height:1.6;
}
.option:hover:not(.locked){background:rgba(0,220,255,0.06);border-color:rgba(0,220,255,0.3);}
.option.sel{background:rgba(0,220,255,0.1);border-color:rgba(0,220,255,0.5);}
.option.cor{background:rgba(168,255,62,0.1);border-color:var(--accent3);}
.option.wrg{background:rgba(248,113,113,0.1);border-color:#f87171;}
.opt-letter{
  min-width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:0.75rem;flex-shrink:0;
  font-family:'Space Mono',monospace;color:var(--muted);
}
.option.cor .opt-letter{background:var(--accent3);color:#060a12;}
.option.wrg .opt-letter{background:#f87171;color:#060a12;}
.option.sel:not(.cor):not(.wrg) .opt-letter{background:rgba(0,220,255,0.4);color:#060a12;}
.fb{
  margin-top:14px;padding:14px 16px;border-radius:12px;
  font-size:0.86rem;line-height:1.7;
  animation:slideUp 0.3s ease;font-family:'Space Mono',monospace;
}
@keyframes slideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fb-ok{background:rgba(168,255,62,0.07);border:1px solid rgba(168,255,62,0.25);color:#a8ff3e;}
.fb-no{background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.25);color:#fca5a5;}
.next-btn{
  margin-top:18px;padding:14px;border-radius:12px;border:none;
  color:#060a12;font-size:0.95rem;font-weight:800;
  cursor:pointer;width:100%;transition:all 0.2s;font-family:'Syne',sans-serif;
}
.next-btn:hover{transform:translateY(-2px);}

/* results */
.score-big{
  font-size:4.5rem;font-weight:900;text-align:center;margin:10px 0 4px;
  font-family:'Space Mono',monospace;
}
.score-lbl{text-align:center;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:20px;font-size:0.85rem;}
.grade-badge{
  padding:8px 24px;border-radius:99px;font-weight:800;
  font-size:0.95rem;width:fit-content;margin:0 auto 24px;display:block;text-align:center;
}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;}
.stat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:14px;text-align:center;}
.stat .n{font-size:1.8rem;font-weight:800;font-family:'Space Mono',monospace;}
.stat .l{font-size:0.72rem;color:var(--muted);margin-top:3px;font-family:'Space Mono',monospace;}
.advice{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px;margin-bottom:20px;font-size:0.84rem;color:var(--muted);line-height:1.75;font-family:'Space Mono',monospace;}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.btn-sec{
  padding:13px;border-radius:12px;
  border:1.5px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);
  color:var(--text);font-size:0.88rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;font-family:'Syne',sans-serif;
}
.btn-sec:hover{background:rgba(255,255,255,0.08);}
.streak-info{font-size:0.8rem;font-family:'Space Mono',monospace;}

/* WIP overlay */
.wip-screen{text-align:center;padding:20px 0;}
.wip-icon{font-size:4rem;margin-bottom:16px;}
.wip-title{font-size:1.8rem;font-weight:900;margin-bottom:8px;}
.wip-sub{font-size:0.88rem;color:var(--muted);line-height:1.7;margin-bottom:28px;font-family:'Space Mono',monospace;}

@media(max-width:520px){
  .card{padding:22px 16px;}
  h1{font-size:1.8rem;}
  .stat-row{grid-template-columns:1fr 1fr;}
  .btn-row{grid-template-columns:1fr;}
  .score-big{font-size:3.2rem;}
  .type-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── DATA ──────────────────────────────────────────────────────────────────────
const CH1_THEORY = [
  {part:"Atomic Theory & Energy Bands",q:"At absolute zero temperature (0 K), what is the state of a pure silicon crystal regarding electrical conduction?",o:["High conductivity due to packed valence electrons","Zero conductivity because all covalent bonds are intact","Moderate conductivity due to the narrow 1.1 eV gap","Superconductivity because of the lack of lattice vibration"],c:1,n:"At 0 K, all electrons are bound in covalent bonds (valence band), leaving no free electrons available for conduction."},
  {part:"Atomic Theory & Energy Bands",q:"Which statement accurately describes the 'valence orbit' in the basic atomic model?",o:["It is the orbit closest to the nucleus with the lowest energy","It is any orbit containing exactly eight electrons","It is the outermost orbit of an atom","It is the forbidden region between energy levels"],c:2,n:"The outermost orbit is defined as the valence orbit, and its electrons participate in chemical bonding."},
  {part:"Atomic Theory & Energy Bands",q:"What is the defined energy required to decrease an electron's potential by 1 Volt?",o:["1.602 × 10⁻¹⁹ Joules","1.1 Electron Volts","0.76 Electron Volts","1.0 Joule per Coulomb"],c:0,n:"1 eV is defined as the energy needed to change potential by 1 V, which equals 1.602 × 10⁻¹⁹ Joules."},
  {part:"Atomic Theory & Energy Bands",q:"Silicon and Germanium are referred to as 'tetravalent' because they have:",o:["Four distinct energy shells in their atomic structure","Four protons more than their nearest noble gas","Four electrons in their outermost orbit","Four isotopes commonly found in nature"],c:2,n:"Tetravalent atoms specifically have four valence band electrons."},
  {part:"Atomic Theory & Energy Bands",q:"In an energy-band diagram, where are the electrons that contribute to electric current located?",o:["The forbidden band","The valence band","The conduction band","The Fermi level"],c:2,n:"Once liberated from bonds, electrons enter the conduction band where they move and contribute to current."},
  {part:"Atomic Theory & Energy Bands",q:"Which material property allows electrons to jump to the conduction band solely through thermal excitation at room temperature?",o:["Large energy gap (> 5 eV)","Moderate energy gap (~ 1 eV)","Non-existent energy gap","Negative potential barrier"],c:2,n:"Conductors (metals) have very small or non-existent gaps, allowing easy thermal excitation into the conduction band."},
  {part:"Atomic Theory & Energy Bands",q:"Silicon has a bandgap energy of approximately 1.1 eV. What is the corresponding value for Germanium?",o:["1.21 eV","0.30 eV","0.76 eV","0.045 eV"],c:2,n:"While silicon is roughly 1.1–1.2 eV, germanium's energy gap is specifically 0.76 eV."},
  {part:"Atomic Theory & Energy Bands",q:"What happens to the resistance of an intrinsic semiconductor as its temperature increases?",o:["It increases linearly","It remains constant","It decreases","It drops to zero instantly"],c:2,n:"Higher temperatures create more electron-hole pairs, facilitating easier current flow (negative temperature coefficient)."},
  {part:"Atomic Theory & Energy Bands",q:"The 'Forbidden Band' is a region where:",o:["Only holes are allowed to exist","Electrons are trapped in covalent bonds","No allowed energy states exist for electrons","Only donor impurities can reside"],c:2,n:"The band gap (forbidden band) is a range of energy levels with no allowed states for an electron."},
  {part:"Atomic Theory & Energy Bands",q:"What is the 'Generation Rate' in a semiconductor?",o:["The speed of battery-induced current","The speed of free electron and hole creation","The rate of impurity atom evaporation","The frequency of lattice vibrations"],c:1,n:"Generation is the process where free electrons and holes are created; the rate is the speed of this process."},
  {part:"Doping & Extrinsic Semiconductors",q:"To create an n-type semiconductor, which group of elements is used for doping?",o:["Group III (Trivalent)","Group IV (Tetravalent)","Group V (Pentavalent)","Group VI (Hexavalent)"],c:2,n:"Pentavalent atoms (like Phosphorus) have an extra electron to donate, creating n-type material."},
  {part:"Doping & Extrinsic Semiconductors",q:"What is the specific energy level (E_D) of donor electrons in Phosphorus-doped silicon relative to the conduction band (E_C)?",o:["0.76 eV below E_C","0.045 eV below E_C","0.044 eV above E_V","1.12 eV above E_V"],c:1,n:"In n-type silicon, E_D is very close to E_C, typically about 0.045 eV."},
  {part:"Doping & Extrinsic Semiconductors",q:"Which of the following is a Trivalent (Group III) impurity?",o:["Arsenic","Antimony","Boron","Phosphorus"],c:2,n:"Boron, Aluminum, Gallium, and Indium are common trivalent (acceptor) impurities."},
  {part:"Doping & Extrinsic Semiconductors",q:"In a p-type semiconductor, what constitutes the 'Minority Carriers'?",o:["Holes","Trivalent atoms","Free electrons","Acceptor ions"],c:2,n:"In p-type material, holes are the majority; free electrons (thermally generated) are the minority."},
  {part:"Doping & Extrinsic Semiconductors",q:"What is the fundamental relationship between electron density (n) and hole density (p) in any semiconductor at equilibrium?",o:["n + p = nᵢ","n × p = nᵢ²","n / p = nᵢ","n² × p² = nᵢ"],c:1,n:"The product of electron and hole concentrations always equals the square of the intrinsic concentration."},
  {part:"Doping & Extrinsic Semiconductors",q:"Why is a doped semiconductor still considered 'charge neutral'?",o:["It contains equal numbers of free electrons and holes","The number of protons equals the total number of electrons","The impurities are non-conductive","The donor ions cancel the acceptor ions"],c:1,n:"Although there are more free carriers, the total number of protons in the nuclei still balances the total number of electrons."},
  {part:"Doping & Extrinsic Semiconductors",q:"What determines the 'Majority Carrier' concentration in a doped semiconductor at normal temperatures?",o:["Thermal generation rate","Ambient light intensity","Impurity concentration","The recombination rate"],c:2,n:"Majority carriers are determined by the dopant level and are largely independent of temperature unless it is very high."},
  {part:"Doping & Extrinsic Semiconductors",q:"If the temperature of a doped semiconductor becomes extremely high, what happens to its characteristics?",o:["It becomes a perfect insulator","It behaves like an intrinsic semiconductor","Its majority carriers double","It loses all impurity ions"],c:1,n:"At very high temperatures, thermal generation of nᵢ overwhelms the doping concentration, making it behave like intrinsic material."},
  {part:"Doping & Extrinsic Semiconductors",q:"How much energy (E_A) is typically required to move a valence electron into a Boron acceptor site?",o:["0.044 eV","0.045 eV","1.10 eV","0.70 eV"],c:0,n:"For Boron-doped p-type silicon, the energy E_A is approximately 0.044 eV above the valence band."},
  {part:"Doping & Extrinsic Semiconductors",q:"Typical dopant levels in silicon are approximately how many atoms per cm³?",o:["5 × 10²²","10¹⁵","10⁻⁸","10⁴"],c:1,n:"While silicon has ~5 × 10²² atoms/cm³, only ~10¹⁵ dopant atoms/cm³ are needed for conduction."},
  {part:"PN Junction & Biasing",q:"What process occurs first when a P-type and N-type material are brought together?",o:["Avalanche breakdown","Majority carrier diffusion","Minority carrier drift","Zener emission"],c:1,n:"The process begins with majority carriers (holes and electrons) diffusing across the boundary."},
  {part:"PN Junction & Biasing",q:"The 'Depletion Region' is so named because it is depleted of:",o:["All atomic nuclei","Trivalent and Pentavalent ions","Mobile charge carriers","Covalent bonds"],c:2,n:"This region is cleared of free electrons and holes due to recombination near the junction."},
  {part:"PN Junction & Biasing",q:"What is the direction of the 'Diffusion Current' in a PN junction?",o:["N-side to P-side","P-side to N-side","Circularly around the junction","It has no specific direction"],c:1,n:"Holes diffuse from P to N, and electrons diffuse from N to P; by convention, the total diffusion current is P to N."},
  {part:"PN Junction & Biasing",q:"Under 'Open-Circuit' equilibrium, what is the relationship between diffusion current (I_D) and drift current (I_S)?",o:["I_D > I_S","I_D < I_S","I_D = I_S","I_D + I_S = 0.7 A"],c:2,n:"In equilibrium with no external voltage, the two opposite currents must be equal in magnitude."},
  {part:"PN Junction & Biasing",q:"What causes the 'Potential Barrier' (V_O) at the junction?",o:["The resistance of the silicon","Uncovered positive and negative ions","The external battery voltage","Excessive thermal vibration"],c:1,n:"As electrons and holes diffuse, they leave behind uncovered donor (+ve) and acceptor (-ve) ions, creating a field."},
  {part:"PN Junction & Biasing",q:"In 'Forward Bias,' the positive terminal of the source is connected to:",o:["The N-type material","The P-type material","The depletion region directly","The ground terminal only"],c:1,n:"Forward bias connects P to positive and N to negative."},
  {part:"PN Junction & Biasing",q:"What happens to the depletion region width during 'Reverse Bias'?",o:["It narrows significantly","It remains completely unchanged","It widens","It disappears entirely"],c:2,n:"Reverse bias pulls free carriers away from the junction, increasing the width of the depletion zone."},
  {part:"PN Junction & Biasing",q:"Which condition is required for current to flow in a forward-biased PN junction?",o:["The voltage must be exactly 0 V","The voltage must be negative","The voltage must exceed a threshold","The device must be at 0 K"],c:2,n:"A threshold voltage (e.g., ~0.7 V for Si) must be reached to collapse the depletion region and allow current."},
  {part:"PN Junction & Biasing",q:"The 'Built-in Electric Field' in a PN junction points in which direction?",o:["From P-region to N-region","From N-region to P-region","Parallel to the junction surface","It alternates with temperature"],c:1,n:"The uncovered positive ions are on the N-side and negative ions are on the P-side, directing the field from N to P."},
  {part:"PN Junction & Biasing",q:"What is the typical barrier potential (V_O) for a silicon PN junction at room temperature?",o:["0.1 to 0.3 V","0.6 to 0.8 V","1.1 to 1.2 V","5.0 to 7.0 V"],c:1,n:"Silicon's barrier voltage at room temperature is specifically listed as 0.6–0.8 V."},
  {part:"Breakdown & I-V Characteristics",q:"'Zener Breakdown' is primarily caused by:",o:["Impact ionization from collisions","A very strong electric field","High thermal generation rates","Excessive forward biasing"],c:1,n:"Zener breakdown occurs when a high field exerts enough force to pull electrons directly from covalent bonds."},
  {part:"Breakdown & I-V Characteristics",q:"Which mechanism involves a 'chain reaction' of collisions?",o:["Zener breakdown","Diffusion","Avalanche breakdown","Thermal recombination"],c:2,n:"Avalanche multiplication occurs when accelerated carriers collide with atoms, freeing more carriers in a chain reaction."},
  {part:"Breakdown & I-V Characteristics",q:"Zener effect typically occurs if the breakdown voltage (V_Z) is:",o:["Greater than 7 V","Exactly 0.7 V","Less than 5 V","Between 5 V and 7 V"],c:2,n:"Zener breakdown is the dominant mechanism when V_Z is below 5 V."},
  {part:"Breakdown & I-V Characteristics",q:"What happens to the 'Reverse Current' before the breakdown voltage is reached?",o:["It increases linearly with voltage","It is zero in all conditions","It is a small, constant value","It exceeds the forward current"],c:2,n:"This is the leakage current (saturation current), which is very small and nearly independent of voltage until breakdown."},
  {part:"Breakdown & I-V Characteristics",q:"'Impact Ionization' is another term associated with:",o:["Forward bias diffusion","Avalanche breakdown","P-type doping","Atomic covalent bonding"],c:1,n:"Impact ionization refers to carriers acquiring enough energy to knock valence electrons free during collisions."},
  {part:"Breakdown & I-V Characteristics",q:"In equilibrium, the 'Fermi Level' in a PN junction is:",o:["Higher on the P-side","Higher on the N-side","Constant throughout the system","Discontinuous at the junction"],c:2,n:"In thermodynamic equilibrium with no external potential, the Fermi energy has the same value everywhere."},
  {part:"Breakdown & I-V Characteristics",q:"When a PN junction is 'Reverse Biased,' the junction potential increases to:",o:["|V_O| − |V_ext|","|V_ext|","|V_O| + |V_ext|","0 V"],c:2,n:"The external potential aids the built-in barrier, increasing the total potential magnitude."},
  {part:"Breakdown & I-V Characteristics",q:"Which breakdown mechanism is most likely in a 'low-doped' semiconductor?",o:["Zener","Avalanche","Thermal","Covalent"],c:1,n:"Avalanche breakdown is the standard mechanism in more lightly doped junctions."},
  {part:"Breakdown & I-V Characteristics",q:"If the drift current (I_S) exceeds the diffusion current (I_D), the depletion layer will:",o:["Widen","Stay the same","Narrow","Break down"],c:2,n:"If I_S > I_D, uncovered charge decreases, narrowing the layer until equilibrium (I_D = I_S) is restored."},
  {part:"Breakdown & I-V Characteristics",q:"The resistivity of a typical semiconductor is approximately:",o:["10⁻⁸ Ωm","10⁻¹ Ωm","10⁴ Ωm","10¹⁰ Ωm"],c:1,n:"Conductors are ~10⁻⁸, insulators are ~10⁴+, and semiconductors are intermediate at ~10⁻¹ Ωm."},
];

const CH1_CALC = [
  {part:"Calculation",q:"For a photon to excite an electron from the valence band to the conduction band in silicon at room temperature, what is the minimum energy it must possess in Joules?",o:["1.602 × 10⁻¹⁹ J","1.762 × 10⁻¹⁹ J","1.217 × 10⁻¹⁹ J","1.100 × 10⁻¹⁹ J"],c:1,n:"E = 1.1 eV × (1.602 × 10⁻¹⁹ J/eV) = 1.7622 × 10⁻¹⁹ J. The silicon bandgap of 1.1 eV is converted using the eV-to-Joule conversion factor."},
  {part:"Calculation",q:"Intrinsic silicon at 300 K has nᵢ = 1.5 × 10¹⁰ cm⁻³. Doped with N_D = 5 × 10¹⁵ atoms/cm³ phosphorus. What is the resulting hole concentration (p)?",o:["3.0 × 10⁵ cm⁻³","4.5 × 10⁴ cm⁻³","7.5 × 10²⁵ cm⁻³","2.25 × 10⁴ cm⁻³"],c:1,n:"Using the Mass Action Law: p = nᵢ²/N_D = (1.5×10¹⁰)²/(5×10¹⁵) = 2.25×10²⁰/5×10¹⁵ = 4.5×10⁴ cm⁻³."},
  {part:"Calculation",q:"Calculate the built-in barrier voltage V₀ for a silicon PN junction at 300 K with N_A = 2×10¹⁷ cm⁻³, N_D = 4.5×10¹⁵ cm⁻³. (V_T = 26 mV, nᵢ = 1.5×10¹⁰ cm⁻³)",o:["0.621 V","0.814 V","0.738 V","0.545 V"],c:2,n:"V₀ = V_T × ln(N_A·N_D/nᵢ²) = 0.026 × ln[(2×10¹⁷ × 4.5×10¹⁵)/(1.5×10¹⁰)²] = 0.026 × ln(4×10¹²) = 0.026 × 28.38 ≈ 0.738 V."},
  {part:"Calculation",q:"If silicon temperature increases from 300 K (nᵢ = 1.5×10¹⁰ cm⁻³) to 600 K (nᵢ = 1.54×10¹⁵ cm⁻³), by what approximate factor does nᵢ increase?",o:["2 times","1,000 times","100,000 times","10,000,000 times"],c:2,n:"Ratio = (1.54×10¹⁵)/(1.5×10¹⁰) ≈ 102,666 ≈ 10⁵ (100,000 times). This dramatic increase shows the strong temperature dependence of nᵢ."},
  {part:"Calculation",q:"Pure silicon (5×10²² atoms/cm³) is doped with Boron at 2.5×10¹⁶ atoms/cm³. What is the ratio of silicon atoms to Boron atoms?",o:["1,250,000:1","2,000,000:1","500,000:1","200,000,000:1"],c:1,n:"Ratio = (5×10²²)/(2.5×10¹⁶) = 2×10⁶ = 2,000,000:1. This illustrates how sparsely dopant atoms are distributed in the crystal."},
  {part:"Calculation",q:"Phosphorus has E_D located 0.045 eV below the conduction band. If kT at 300 K ≈ 0.0259 eV, what is the ratio of ionization energy to thermal energy?",o:["1.10","1.74","0.58","2.45"],c:1,n:"Ratio = 0.045 eV / 0.0259 eV ≈ 1.737 ≈ 1.74. This low ratio means only about 1.74× kT is needed to ionize a donor — explaining why doping is nearly complete at room temperature."},
  {part:"Calculation",q:"A PN junction has V₀ = 0.75 V. An external reverse bias of V_ext = 12 V is applied. What is the new magnitude of the junction potential?",o:["11.25 V","0.75 V","12.00 V","12.75 V"],c:3,n:"In reverse bias, external potential aids the built-in barrier: Total = |V₀| + |V_ext| = 0.75 + 12 = 12.75 V."},
  {part:"Calculation",q:"A P-type silicon sample at 300 K (nᵢ = 1.5×10¹⁰ cm⁻³) has hole concentration p = 10¹⁷ cm⁻³. What is the ratio of majority to minority carriers?",o:["4.44 × 10¹³ : 1","2.25 × 10³ : 1","6.67 × 10⁶ : 1","1.50 × 10¹⁰ : 1"],c:0,n:"Minority carriers n = nᵢ²/p = (2.25×10²⁰)/10¹⁷ = 2.25×10³ cm⁻³. Ratio = 10¹⁷/(2.25×10³) ≈ 4.44×10¹³ :1."},
  {part:"Calculation",q:"Silicon doped with 10¹⁶ donors/cm³. At 600 K, nᵢ rises to 1.54×10¹⁵ cm⁻³. Calculate the minority carrier concentration.",o:["1.54 × 10¹⁵ cm⁻³","2.37 × 10¹⁴ cm⁻³","1.00 × 10¹⁶ cm⁻³","6.49 × 10¹⁴ cm⁻³"],c:1,n:"p = nᵢ²/N_D = (1.54×10¹⁵)²/10¹⁶ = 2.3716×10³⁰/10¹⁶ = 2.37×10¹⁴ cm⁻³. As nᵢ approaches N_D, the material begins acting intrinsic."},
  {part:"Calculation",q:"A semiconductor cube of side length 2 cm (0.02 m) has resistivity 10⁻¹ Ωm. Using R = ρL/A, what is its resistance?",o:["5.0 Ω","0.2 Ω","1.0 Ω","0.5 Ω"],c:0,n:"R = ρ × L/A = 0.1 × (0.02)/(0.02 × 0.02) = 0.1 × 0.02/0.0004 = 0.002/0.0004 = 5.0 Ω."},
];

const CHAPTERS = [
  {
    id:0, num:"01",
    title:"Basic Atomic Theory, Semiconductors & PN Junctions",
    desc:"Energy bands, doping, PN junction behaviour, breakdown mechanisms",
    theory: CH1_THEORY,
    calc: CH1_CALC,
    ready: true,
  },
  {id:1,num:"02",title:"Diode Circuits & Applications",desc:"Rectifiers, clippers, clampers and diode applications",theory:[],calc:[],ready:false},
  {id:2,num:"03",title:"Bipolar Junction Transistors (BJT)",desc:"BJT operation, biasing configurations and amplifier analysis",theory:[],calc:[],ready:false},
  {id:3,num:"04",title:"Field-Effect Transistors (FET)",desc:"JFET, MOSFET operation and circuit applications",theory:[],calc:[],ready:false},
];

const THEORY_TIME = 45;
const CALC_TIME = 60;
const L = ['A','B','C','D'];
const OK = ["Correct!","Brilliant!","Spot on!","That's right!","Nailed it!","Excellent!","Perfect!"];
const NO = ["Not quite — see the note!","Review this one carefully.","Check the explanation.","Close, but not right.","Study this one again!"];
const rnd = a => a[Math.floor(Math.random()*a.length)];

function App(){
  const [view, setView] = useState('name');
  const [name, setName] = useState('');
  const [selCh, setSelCh] = useState(null);
  const [qType, setQType] = useState(null); // 'theory' | 'calc'
  const [qs, setQs] = useState([]);
  const [qi, setQi] = useState(0);
  const [sel, setSel] = useState(null);
  const [rev, setRev] = useState(false);
  const [ans, setAns] = useState([]);
  const [tl, setTl] = useState(THEORY_TIME);
  const [streak, setStreak] = useState(0);
  const [best, setBest] = useState(0);
  const tmr = useRef(null);

  const timeLimit = qType === 'calc' ? CALC_TIME : THEORY_TIME;

  useEffect(()=>{
    if(view !== 'quiz') return;
    if(rev){clearInterval(tmr.current);return;}
    tmr.current = setInterval(()=>{
      setTl(t=>{
        if(t <= 1){clearInterval(tmr.current);doReveal(null);return 0;}
        return t-1;
      });
    },1000);
    return()=>clearInterval(tmr.current);
  },[view,qi,rev]);

  const doReveal = (idx)=>{
    const q = qs[qi];
    const ok = idx === q.c;
    const ns = ok ? streak+1 : 0;
    setStreak(ns); setBest(b=>Math.max(b,ns));
    setAns(p=>[...p,{chosen:idx,correct:q.c,ok}]);
    setSel(idx); setRev(true);
  };

  const pick = (idx)=>{
    if(rev) return;
    clearInterval(tmr.current);
    setSel(idx);
    setTimeout(()=>doReveal(idx),180);
  };

  const next = ()=>{
    if(qi+1 >= qs.length){ setView('results'); }
    else{ setQi(qi+1); setSel(null); setRev(false); setTl(timeLimit); }
  };

  const startQuiz = (ch, type)=>{
    const questions = type === 'theory' ? ch.theory : ch.calc;
    setSelCh(ch); setQType(type); setQs(questions);
    setQi(0); setAns([]); setSel(null); setRev(false);
    setTl(type === 'calc' ? CALC_TIME : THEORY_TIME);
    setStreak(0); setBest(0);
    setView('quiz');
  };

  const score = ans.filter(a=>a.ok).length;
  const pct = qs.length ? Math.round((score/qs.length)*100) : 0;

  const grade = (p)=>{
    if(p>=90) return {lbl:'Outstanding! 🏆',bg:'#a8ff3e',col:'#060a12'};
    if(p>=75) return {lbl:'Excellent! ⭐',bg:'#00dcff',col:'#060a12'};
    if(p>=60) return {lbl:'Good work! 👍',bg:'#ff6b35',col:'#fff'};
    if(p>=50) return {lbl:'Keep going! 📖',bg:'#a78bfa',col:'#fff'};
    return {lbl:'More revision needed 💪',bg:'#f87171',col:'#fff'};
  };

  const g = grade(pct);
  const tc = tl > (timeLimit*0.5) ? 'tok' : tl > (timeLimit*0.25) ? 'twarn' : 'tdanger';
  const accentColor = qType === 'calc' ? 'var(--calc)' : 'var(--theory)';
  const q = qs[qi];
  const lastAns = ans[ans.length-1];

  if(view === 'name') return (
    <div className="app">
      <div className="grid-bg"/>
      <div className="card">
        <div className="logo-row">
          <div className="logo-icon">⚡</div>
          <div>
            <div className="logo-text">Electronics Revision</div>
          </div>
        </div>
        <h1>Master <span>Electronics</span><br/>One Question at a Time</h1>
        <p className="sub">Chapter-by-chapter MCQ revision.<br/>Theory mode: 45s/question · Calculation mode: 60s/question</p>
        <input type="text" placeholder="Enter your name to begin..."
          value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&name.trim()&&setView('chapter')}/>
        <button className="btn-primary" onClick={()=>{if(name.trim())setView('chapter');}}>
          Begin Revision →
        </button>
      </div>
    </div>
  );

  if(view === 'chapter') return (
    <div className="app">
      <div className="grid-bg"/>
      <div className="card">
        <p className="section-label">Select Chapter</p>
        <h2>Hello, {name.split(' ')[0]}! 👋</h2>
        <p className="sub" style={{marginBottom:24}}>Choose a chapter to start revising. Completed chapters show both Theory & Calculation modes.</p>
        <div className="ch-grid">
          {CHAPTERS.map(ch=>(
            <div key={ch.id}
              className={`ch-card${!ch.ready?' wip':''}`}
              onClick={()=>ch.ready&&setView('type_select')===undefined&&ch.ready&&(setSelCh(ch)||setView('type_select'))}
            >
              <div className="ch-num">{ch.num}</div>
              <div className="ch-info">
                <h3>{ch.title}</h3>
                <p>{ch.desc}</p>
              </div>
              {ch.ready
                ? <div className="ready-badge">READY</div>
                : <div className="wip-badge">IN PROGRESS</div>
              }
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  if(view === 'type_select' && selCh) return (
    <div className="app">
      <div className="grid-bg"/>
      <div className="card">
        <button onClick={()=>setView('chapter')} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontFamily:'Space Mono',fontSize:'0.8rem',marginBottom:20,padding:0}}>← Back</button>
        <p className="section-label">Chapter {selCh.num}</p>
        <h2>{selCh.title}</h2>
        <p className="sub" style={{marginBottom:24}}>Choose your quiz mode for this chapter:</p>
        <div className="type-grid">
          <div className="type-card theory-card" onClick={()=>startQuiz(selCh,'theory')}>
            <div className="type-icon">📚</div>
            <h3>Theory MCQs</h3>
            <p>Conceptual questions covering definitions, mechanisms and principles</p>
            <div className="type-timer theory-timer">{selCh.theory.length} questions · 45s each</div>
          </div>
          <div className="type-card calc-card" onClick={()=>startQuiz(selCh,'calc')}>
            <div className="type-icon">🧮</div>
            <h3>Calculation MCQs</h3>
            <p>Numerical problems requiring formulas, substitution and computation</p>
            <div className="type-timer calc-timer">{selCh.calc.length} questions · 60s each</div>
          </div>
        </div>
      </div>
    </div>
  );

  if(view === 'quiz' && q) {
    const prog = (qi/qs.length)*100;
    return (
      <div className="app">
        <div className="grid-bg"/>
        <div className="card">
          <div className="progress-top">
            <span>{qi+1} / {qs.length}</span>
            <span className="streak-info">
              {streak >= 2
                ? <span style={{color:accentColor,fontWeight:700}}>🔥 {streak} streak</span>
                : <span>{score} correct</span>}
            </span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{width:prog+'%',background:`linear-gradient(90deg,${accentColor},var(--accent3))`}}/>
          </div>
          <div className="timer-row">
            <div>
              <div className={`q-tag ${qType==='theory'?'theory-tag':'calc-tag'}`}>
                {qType === 'theory' ? '📚 THEORY' : '🧮 CALCULATION'} · {q.part}
              </div>
            </div>
            <div className={`timer-ring ${tc}`}>{tl}s</div>
          </div>
          <p className="q-text">{q.q}</p>
          <div className="options">
            {q.o.map((opt,idx)=>{
              let cls = 'option';
              if(rev){
                if(idx === q.c) cls += ' cor';
                else if(idx === sel && idx !== q.c) cls += ' wrg';
                cls += ' locked';
              } else if(idx === sel) cls += ' sel';
              return (
                <div key={idx} className={cls} onClick={()=>pick(idx)}>
                  <span className="opt-letter">{L[idx]}</span>
                  <span>{opt}</span>
                </div>
              );
            })}
          </div>
          {rev && (
            <div className={`fb ${lastAns?.ok?'fb-ok':'fb-no'}`}>
              <strong>{lastAns?.ok ? rnd(OK) : rnd(NO)}</strong>
              <br/><span style={{opacity:0.85}}>{q.n}</span>
            </div>
          )}
          {rev && (
            <button className="next-btn"
              style={{background:`linear-gradient(135deg,${accentColor},var(--accent3))`}}
              onClick={next}>
              {qi+1 >= qs.length ? 'See Results 🎉' : 'Next →'}
            </button>
          )}
        </div>
      </div>
    );
  }

  if(view === 'results') return (
    <div className="app">
      <div className="grid-bg"/>
      <div className="card">
        <div style={{textAlign:'center',marginBottom:8}}>
          <div style={{fontSize:'2.2rem',marginBottom:8}}>⚡</div>
          <h2>Done, {name.split(' ')[0]}!</h2>
          <p style={{fontSize:'0.78rem',color:'var(--muted)',marginTop:4,fontFamily:'Space Mono'}}>
            Ch.{selCh?.num} · {qType==='theory'?'Theory MCQs':'Calculation MCQs'}
          </p>
        </div>
        <div className="score-big" style={{
          background:`linear-gradient(135deg,${accentColor},var(--accent3))`,
          WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'
        }}>{score}/{qs.length}</div>
        <p className="score-lbl">{pct}% correct</p>
        <div className="grade-badge" style={{background:g.bg,color:g.col}}>{g.lbl}</div>
        <div className="stat-row">
          <div className="stat"><div className="n" style={{color:'var(--accent3)'}}>{score}</div><div className="l">Correct</div></div>
          <div className="stat"><div className="n" style={{color:'#f87171'}}>{qs.length-score}</div><div className="l">Missed</div></div>
          <div className="stat"><div className="n" style={{color:accentColor}}>{best}</div><div className="l">Best Streak</div></div>
        </div>
        <div className="advice">
          {pct>=80
            ? "Excellent grasp of the material! Review any missed items to achieve full mastery before your exam."
            : pct>=60
            ? qType==='theory'
              ? "Good foundation! Focus on: energy band transitions, the Mass Action Law (n·p = nᵢ²), and differences between Zener vs Avalanche breakdown."
              : "Decent start on calculations! Practice the barrier voltage formula V₀ = V_T·ln(N_A·N_D/nᵢ²) and unit conversions (eV ↔ Joules) until automatic."
            : qType==='theory'
            ? "Revisit core concepts: bandgap energy, n-type vs p-type doping, depletion region formation, and the direction of diffusion vs drift currents."
            : "Go back to basics: Master the Mass Action Law, eV-to-Joule conversion, and the reverse bias potential formula before attempting calculations again."
          }
        </div>
        <div className="btn-row">
          <button className="btn-sec" onClick={()=>startQuiz(selCh,qType)}>Retry this set</button>
          <button className="btn-sec" onClick={()=>setView('type_select')}>Switch mode</button>
        </div>
        <button className="btn-primary" onClick={()=>setView('chapter')}>Back to Chapters</button>
      </div>
    </div>
  );

  return null;
}

      <div className="card">
        <p className="section-label">Select Chapter</p>
        <h2>Hello, {name.split(' ')[0]}! 👋</h2>
        <p className="sub" style={{marginBottom:22}}>Select a ready chapter. Chapters 2–4 are being prepared.</p>
        <div className="ch-grid">
          {CHAPTERS.map(ch=>(
            <div key={ch.id}
              className={`ch-card${!ch.ready?' wip':''}`}
              onClick={()=>{if(ch.ready){setSelCh(ch);setView('type_select');}}}
            >
              <div className="ch-num">{ch.num}</div>
              <div className="ch-info">
                <h3>{ch.title}</h3>
                <p>{ch.desc}</p>
              </div>
              {ch.ready
                ? <div className="ready-badge">READY</div>
                : <div className="wip-badge">IN PROGRESS</div>
              }
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  if(view==='type_select'&&selCh) return(
    <div className="app">
      <div className="grid-bg"/>
      <div className="card">
        <button onClick={()=>setView('chapter')} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontFamily:'Space Mono',fontSize:'0.78rem',marginBottom:20,padding:0,display:'flex',alignItems:'center',gap:6}}>
          ← Back to chapters
        </button>
        <p className="section-label">Chapter {selCh.num}</p>
        <h2 style={{marginBottom:6}}>{selCh.title}</h2>
        <p className="sub" style={{marginBottom:24}}>{selCh.desc}</p>
        <div className="type-grid">
          <div className="type-card theory-card" onClick={()=>startQuiz(selCh,'theory')}>
            <div className="type-icon">📚</div>
            <h3>Theory MCQs</h3>
            <p>Conceptual questions — definitions, mechanisms, principles and qualitative reasoning</p>
            <div className="type-timer theory-timer">{selCh.theory.length} questions · 45s each</div>
          </div>
          <div className="type-card calc-card" onClick={()=>startQuiz(selCh,'calc')}>
            <div className="type-icon">🧮</div>
            <h3>Calculation MCQs</h3>
            <p>Numerical problems — formula application, substitution and multi-step computation</p>
            <div className="type-timer calc-timer">{selCh.calc.length} questions · 60s each</div>
          </div>
        </div>
      </div>
    </div>
  );

  if(view==='quiz'&&q){
    const prog = (qi/qs.length)*100;
    return(
      <div className="app">
        <div className="grid-bg"/>
        <div className="card">
          <div className="progress-top">
            <span>{qi+1} / {qs.length}</span>
            <span className="streak-info">
              {streak>=2
                ?<span style={{color:accentColor,fontWeight:700}}>🔥 {streak} in a row!</span>
                :<span>{score} correct so far</span>}
            </span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{width:prog+'%',background:`linear-gradient(90deg,${accentColor},var(--accent3))`}}/>
          </div>
          <div className="timer-row">
            <div>
              <div className={`q-tag ${qType==='theory'?'theory-tag':'calc-tag'}`}>
                {qType==='theory'?'📚 THEORY':'🧮 CALCULATION'}
              </div>
              <div style={{fontSize:'0.72rem',color:'var(--muted)',marginTop:5,fontFamily:'Space Mono'}}>{q.part}</div>
            </div>
            <div className={`timer-ring ${tc}`}>{tl}s</div>
          </div>
          <p className="q-text">{q.q}</p>
          <div className="options">
            {q.o.map((opt,idx)=>{
              let cls='option';
              if(rev){
                if(idx===q.c) cls+=' cor';
                else if(idx===sel&&idx!==q.c) cls+=' wrg';
                cls+=' locked';
              } else if(idx===sel) cls+=' sel';
              return(
                <div key={idx} className={cls} onClick={()=>pick(idx)}>
                  <span className="opt-letter">{L[idx]}</span>
                  <span>{opt}</span>
                </div>
              );
            })}
          </div>
          {rev&&(
            <div className={`fb ${lastAns?.ok?'fb-ok':'fb-no'}`}>
              <strong>{lastAns?.ok?rnd(OK):rnd(NO)}</strong>
              <br/><span style={{opacity:0.85,fontSize:'0.83rem'}}>{q.n}</span>
            </div>
          )}
          {rev&&(
            <button className="next-btn"
              style={{background:`linear-gradient(135deg,${accentColor},var(--accent3))`}}
              onClick={next}>
              {qi+1>=qs.length?'See Results 🎉':'Next Question →'}
            </button>
          )}
        </div>
      </div>
    );
  }

  if(view==='results') return(
    <div className="app">
      <div className="grid-bg"/>
      <div className="card">
        <div style={{textAlign:'center',marginBottom:8}}>
          <div style={{fontSize:'2rem',marginBottom:8}}>⚡</div>
          <h2>Done, {name.split(' ')[0]}!</h2>
          <p style={{fontSize:'0.76rem',color:'var(--muted)',fontFamily:'Space Mono',marginTop:4}}>
            Ch.{selCh?.num} · {qType==='theory'?'Theory MCQs':'Calculation MCQs'}
          </p>
        </div>
        <div className="score-big" style={{
          background:`linear-gradient(135deg,${accentColor},var(--accent3))`,
          WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'
        }}>{score}/{qs.length}</div>
        <p className="score-lbl">{pct}% correct</p>
        <div className="grade-badge" style={{background:g.bg,color:g.col}}>{g.lbl}</div>
        <div className="stat-row">
          <div className="stat"><div className="n" style={{color:'var(--accent3)'}}>{score}</div><div className="l">Correct</div></div>
          <div className="stat"><div className="n" style={{color:'#f87171'}}>{qs.length-score}</div><div className="l">Missed</div></div>
          <div className="stat"><div className="n" style={{color:accentColor}}>{best}</div><div className="l">Best Streak</div></div>
        </div>
        <div className="advice">
          {pct>=80
            ?"Strong performance! Review any missed items — you're well-prepared for this chapter."
            :pct>=60
            ? qType==='theory'
              ?"Good foundation! Focus on: energy band transitions, the Mass Action Law (n·p = nᵢ²), and differences between Zener vs Avalanche breakdown."
              :"Decent start! Drill the barrier voltage formula V₀ = V_T·ln(N_A·N_D/nᵢ²) and eV ↔ Joule conversions until they're automatic."
            : qType==='theory'
            ?"Revisit core concepts: bandgap energy, n-type vs p-type doping, depletion region formation, and diffusion vs drift currents."
            :"Go back to basics: Master the Mass Action Law, eV conversions, and reverse bias potential formula before attempting calculations again."
          }
        </div>
        <div className="btn-row">
          <button className="btn-sec" onClick={()=>startQuiz(selCh,qType)}>↺ Retry this set</button>
          <button className="btn-sec" onClick={()=>{setSelCh(selCh);setView('type_select');}}>⇄ Switch mode</button>
        </div>
        <button className="btn-primary" onClick={()=>setView('chapter')}>← Back to Chapters</button>
      </div>
    </div>
  );

  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FixedApp/>);
</script>
</body>
</html>
